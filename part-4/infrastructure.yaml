apiVersion: kueue.x-k8s.io/v1beta2
kind: ClusterQueue
metadata:
  name: preemption-cq
spec:
  namespaceSelector: {} # Match all namespaces
  preemption:
    withinClusterQueue: LowerPriority # High-priority can evict low-priority
  resourceGroups:
  - coveredResources: ["cpu", "memory"]
    flavors:
    - name: default-flavor
      resources:
      - name: cpu
        nominalQuota: 1000m
      - name: memory
        nominalQuota: 1Gi
---
apiVersion: kueue.x-k8s.io/v1beta2
kind: LocalQueue
metadata:
  name: preemption-lq
  namespace: default
spec:
  clusterQueue: preemption-cq
---
apiVersion: kueue.x-k8s.io/v1beta2
kind: ResourceFlavor
metadata:
  name: default-flavor
